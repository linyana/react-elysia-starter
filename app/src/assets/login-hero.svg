<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <defs>
    <linearGradient id="orb1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="orb2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="panelStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="chartLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
  </defs>

  <!-- Floating gradient orbs -->
  <circle cx="120" cy="110" r="110" fill="url(#orb1)" filter="url(#soft)" opacity="0.9"/>
  <circle cx="500" cy="380" r="130" fill="url(#orb2)" filter="url(#soft)" opacity="0.9"/>

  <!-- Dashboard card -->
  <g transform="translate(120 90)">
    <rect width="360" height="220" rx="18" fill="#ffffff" fill-opacity="0.06" stroke="url(#panelStroke)" stroke-width="1"/>

    <!-- Card header -->
    <circle cx="24" cy="26" r="6" fill="#ffffff" fill-opacity="0.45"/>
    <rect x="40" y="20" width="120" height="12" rx="6" fill="#ffffff" fill-opacity="0.25"/>
    <rect x="300" y="18" width="44" height="16" rx="8" fill="#ffffff" fill-opacity="0.12"/>

    <!-- Chart grid -->
    <g stroke="#ffffff" stroke-opacity="0.08" stroke-width="1">
      <line x1="24" y1="70" x2="336" y2="70"/>
      <line x1="24" y1="110" x2="336" y2="110"/>
      <line x1="24" y1="150" x2="336" y2="150"/>
      <line x1="24" y1="190" x2="336" y2="190"/>
    </g>

    <!-- Chart line -->
    <path d="M24 170 C 70 150, 110 120, 150 130 S 230 90, 270 100 S 320 60, 336 70"
          stroke="url(#chartLine)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M24 170 C 70 150, 110 120, 150 130 S 230 90, 270 100 S 320 60, 336 70 L 336 200 L 24 200 Z"
          fill="url(#chartLine)" fill-opacity="0.12"/>

    <!-- Data point -->
    <circle cx="270" cy="100" r="5" fill="#ffffff"/>
    <circle cx="270" cy="100" r="10" fill="#ffffff" fill-opacity="0.2"/>
  </g>
</svg>
